name: Copilot Setup Steps

# This workflow configures the environment for GitHub Copilot Agent
# Automatically run the setup steps when they are changed to allow for easy validation
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
jobs:
  # The job MUST be called 'copilot-setup-steps' to be recognized by GitHub Copilot Agent
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install gh-aw extension
        uses: github/gh-aw/actions/setup-cli@v0.51.0
        with:
          version: v0.51.0
      - name: Install ASH v3.2.2
        run: pipx install git+https://github.com/awslabs/automated-security-helper.git@v3.2.2
  
  
      # ASH is installed here so the `ash mcp` stdio server is available
      # to the Copilot coding agent. The repo admin must also add the MCP
      # JSON configuration in Settings > Copilot > Coding agent:
      #
      #   {
      #     "mcpServers": {
      #       "ash": {
      #         "type": "local",
      #         "command": "ash",
      #         "args": ["mcp"],
      #         "tools": [
      #           "scan_directory",
      #           "get_scan_progress",
      #           "get_scan_results",
      #           "list_active_scans",
      #           "cancel_scan",
      #           "check_installation"
      #         ]
      #       }
      #     }
      #   }
