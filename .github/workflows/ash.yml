name: Automated Security Helper

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ash-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ash-scan:
    name: ASH security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ASH v3.2.2
        run: pipx install git+https://github.com/awslabs/automated-security-helper.git@v3.2.2

      - name: Run ASH in container mode
        run: ash --mode container --source-dir . --output-dir ash_output --no-fail-on-findings

      - name: Print findings summary
        if: always()
        run: |
          if [ -f ash_output/reports/ash.summary.txt ]; then
            echo "::warning::ASH scan found findings — review the summary below and the uploaded artifact for details."
            cat ash_output/reports/ash.summary.txt
          fi

      - name: Upload ASH results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ash-results
          path: ash_output/
          retention-days: 30
